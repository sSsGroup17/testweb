<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff7e5f, #feb47b); /* Red-based gradient */
            font-family: Arial, sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #ff4c4c; /* Red header */
        }
        .cart-button {
            background-color: #fff; /* White background for the button */
            border: none;
            color: #ff4c4c;
            padding: 10px 15px;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .cart-button:hover {
            background-color: #ffcccb; /* Light red on hover */
        }
    </style>
</head>
<body>

<header>
    <h1>My Store</h1>
    <button class="cart-button" onclick="window.location.href='cart.html'">Cart</button>
    <button onclick="logout()">Logout</button>
</header>

<script>
    // Example function for managing products in localStorage
    function addToCart(product) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(product);
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function logout() {
        // Implement logout functionality here
        console.log("Logging out...");
    }
</script>

<!-- Other content of the store -->
</body>
</html>
