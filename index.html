<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        form { background: white; padding: 2rem; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        input { margin-bottom: 1rem; width: 100%; padding: 0.5rem; }
        button { width: 100%; padding: 0.5rem; background-color: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>Access Code Login</h2>
        <input type="text" id="accessCode" placeholder="Enter Access Code" required />
        <button type="submit">Login</button>
        <p id="errorMessage" style="color:red; display:none;">Incorrect access code. Please try again.</p>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const accessCode = document.getElementById('accessCode').value;
            if (accessCode === 'AMONIYAM123') {
                window.location.href = 'store.html'; // Redirect to the shopping store page
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
